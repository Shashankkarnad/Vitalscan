<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalScan — Analyzing</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #05080f;
  --bg2:     #090d18;
  --surface: #0e1420;
  --surface2:#131a27;
  --border:  #1a2436;
  --border2: #223048;
  --text:    #c5d8f0;
  --muted:   #3d5a7a;
  --dim:     #7a9ab8;
  --white:   #e8f3ff;
  --blue:    #3b9eff;
  --cyan:    #22d3ee;
  --green:   #34d399;
  --yellow:  #f59e0b;
  --red:     #f43f5e;
  --grad:    linear-gradient(135deg, #3b9eff, #22d3ee);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cabinet Grotesk', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* noise */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: .4;
}

.orb { position: fixed; border-radius: 50%; filter: blur(130px); pointer-events: none; z-index: 0; }
.orb1 { width: 700px; height: 700px; background: rgba(59,158,255,.05); top: -200px; left: -200px; }
.orb2 { width: 500px; height: 500px; background: rgba(34,211,238,.04); bottom: -150px; right: -100px; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; padding: 0 32px; height: 60px;
  background: rgba(5,8,15,.88); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-logo-mark {
  width: 28px; height: 28px; background: var(--grad);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
}
.nav-logo-mark svg { width: 16px; height: 16px; }
.nav-logo-text { font-size: 15px; font-weight: 800; color: var(--white); letter-spacing: -.02em; }

/* ── MAIN CONTAINER ── */
main {
  position: relative; z-index: 1;
  width: 100%; max-width: 520px;
  padding: 24px;
  display: flex; flex-direction: column; align-items: center;
  animation: fadeIn .4s ease both;
}

/* ── PULSE RING ── */
.pulse-wrap {
  position: relative;
  width: 80px; height: 80px;
  margin-bottom: 36px;
}

.pulse-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1.5px solid rgba(59,158,255,.3);
  animation: ringPulse 2s ease-out infinite;
}
.pulse-ring:nth-child(2) { animation-delay: .6s; }
.pulse-ring:nth-child(3) { animation-delay: 1.2s; }

.pulse-core {
  position: absolute; inset: 16px;
  background: var(--grad);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 24px rgba(59,158,255,.25);
}
.pulse-core svg { width: 22px; height: 22px; }

/* ── HEADLINE ── */
.headline {
  font-size: clamp(22px, 4vw, 28px);
  font-weight: 900;
  color: var(--white);
  letter-spacing: -.03em;
  text-align: center;
  margin-bottom: 8px;
  line-height: 1.15;
}
.headline em {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sub {
  font-size: 14px;
  color: var(--dim);
  text-align: center;
  margin-bottom: 40px;
}

/* ── PROGRESS BAR ── */
.progress-wrap {
  width: 100%;
  margin-bottom: 32px;
}

.progress-bar-track {
  width: 100%;
  height: 3px;
  background: var(--border2);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 8px;
}

.progress-bar-fill {
  height: 100%;
  background: var(--grad);
  border-radius: 99px;
  width: 0%;
  transition: width .6s cubic-bezier(.4, 0, .2, 1);
}

.progress-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.progress-status {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--dim);
  font-weight: 400;
  min-height: 18px;
}

.progress-pct {
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--blue);
  font-weight: 500;
}

/* ── MILESTONES ── */
.milestones {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 24px;
}

.milestone {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  transition: background .3s;
}
.milestone:last-child { border-bottom: none; }
.milestone.active { background: var(--surface2); }

.ms-dot {
  width: 22px; height: 22px; min-width: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  transition: all .3s;
}

.milestone.done   .ms-dot { background: rgba(52,211,153,.12); border-color: var(--green); }
.milestone.active .ms-dot { background: rgba(59,158,255,.12); border-color: var(--blue); animation: spinDot 1.2s linear infinite; }

.ms-dot svg { width: 11px; height: 11px; }

.ms-body { flex: 1; }
.ms-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  transition: color .3s;
}
.milestone.done   .ms-title { color: var(--green); }
.milestone.active .ms-title { color: var(--white); }

.ms-detail {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  margin-top: 2px;
  min-height: 15px;
  opacity: 0;
  transition: opacity .4s;
}
.milestone.active .ms-detail,
.milestone.done   .ms-detail { opacity: 1; }

.ms-time {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  opacity: 0;
  transition: opacity .3s;
}
.milestone.done .ms-time { opacity: 1; color: var(--green); }

/* ── FACT CARD ── */
.fact-card {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  min-height: 68px;
  transition: opacity .4s;
}

.fact-icon {
  width: 28px; height: 28px; min-width: 28px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  margin-top: 1px;
}
.fact-icon svg { width: 14px; height: 14px; }

.fact-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 4px;
}
.fact-text {
  font-size: 13px;
  color: var(--dim);
  line-height: 1.5;
}
.fact-text strong { color: var(--text); font-weight: 600; }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes ringPulse { 0% { transform: scale(.7); opacity: .6; } 100% { transform: scale(1.8); opacity: 0; } }
@keyframes spinDot { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

@media (max-width: 600px) {
  nav { padding: 0 20px; }
  main { padding: 16px; }
}
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav>
  <a href="#" class="nav-logo">
    <div class="nav-logo-mark">
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M8 2C8 2 4 5.5 4 9a4 4 0 0 0 8 0C12 5.5 8 2 8 2Z" fill="white" opacity=".9"/>
        <path d="M5.5 9.5C5.5 8 6.5 7 8 7" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".5"/>
      </svg>
    </div>
    <span class="nav-logo-text">VitalScan</span>
  </a>
</nav>

<main>

  <!-- Pulse ring -->
  <div class="pulse-wrap">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-core">
      <svg viewBox="0 0 22 22" fill="none">
        <path d="M2 11h3l2-6 4 12 3-9 2 3h4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <div class="headline">Analyzing your <em>health data</em></div>
  <div class="sub">Running clinical checks across your full history. Don't close this tab.</div>

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label">
      <span class="progress-status" id="progressStatus">Starting up...</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
  </div>

  <!-- Milestones -->
  <div class="milestones" id="milestones">
    <!-- Populated by JS -->
  </div>

  <!-- Did-you-know fact -->
  <div class="fact-card" id="factCard">
    <div class="fact-icon">
      <svg viewBox="0 0 14 14" fill="none">
        <circle cx="7" cy="7" r="5.5" stroke="#3b9eff" stroke-width="1.2"/>
        <path d="M7 6v4M7 4.5v.5" stroke="#3b9eff" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="fact-label">Did you know</div>
      <div class="fact-text" id="factText">Loading fact...</div>
    </div>
  </div>

</main>

<script>
const API_URL = 'http://localhost:8000/analyze';

// ── Milestones ──────────────────────────────────────────────────────────────
const MILESTONES = [
  { title:'Unpacking export',       statusText:'Reading ZIP archive…',          detail:'Locating export.xml inside your archive',       durationMs:1200, pctEnd:8  },
  { title:'Parsing health records', statusText:'Reading health records…',        detail:'Streaming through all record types',             durationMs:3200, pctEnd:30 },
  { title:'Deduplicating sources',  statusText:'Deduplicating data sources…',    detail:'Resolving overlaps between devices',             durationMs:1800, pctEnd:42 },
  { title:'Aggregating heart data', statusText:'Processing heart rate & HRV…',   detail:'Morning HRV window, RHR trend',                  durationMs:2200, pctEnd:56 },
  { title:'Analyzing sleep',        statusText:'Analyzing sleep architecture…',  detail:'Deep, REM, core staging per night',              durationMs:2400, pctEnd:70 },
  { title:'Running clinical checks',statusText:'Applying clinical thresholds…',  detail:'AASM · Framingham · WHO · Shaffer & Ginsberg',   durationMs:2800, pctEnd:86 },
  { title:'Generating findings',    statusText:'Ranking findings by severity…',  detail:'Ordering by clinical significance',              durationMs:1600, pctEnd:96 },
  { title:'Building your report',   statusText:'Finalising…',                    detail:'Preparing your results',                        durationMs:800,  pctEnd:100},
];

// ── Facts ────────────────────────────────────────────────────────────────────
const FACTS = [
  'Your <strong>resting heart rate</strong> is one of the most reliable long-term indicators of cardiovascular fitness. Even a 5 bpm drop over 6 months is meaningful.',
  '<strong>HRV (Heart Rate Variability)</strong> reflects how well your nervous system recovers. A downward trend over weeks often precedes illness or burnout.',
  '<strong>SpO₂ drops below 88%</strong> during sleep are a key clinical screening signal for obstructive sleep apnea, per the AASM guidelines.',
  '<strong>Deep sleep</strong> is when your brain clears metabolic waste and your body repairs tissue. Less than 60 minutes per night is associated with cognitive decline.',
  '<strong>REM sleep</strong> consolidates emotional memories and supports creativity. You typically need 90+ minutes per night for full benefit.',
  'The <strong>Framingham Heart Study</strong> — tracking 15,000 people since 1948 — established many of the thresholds we use today for heart rate and cardiovascular risk.',
  '<strong>Morning HRV</strong> (measured 2–9 AM, during or just after sleep) is the clinically validated window. All-day averages are inflated by activity and stress.',
  'Most consumer wearables agree with clinical equipment within <strong>2–5 bpm</strong> for resting heart rate. Accuracy drops during high-intensity exercise.',
];

// ── Render milestones ────────────────────────────────────────────────────────
const msContainer = document.getElementById('milestones');
MILESTONES.forEach((m, i) => {
  const div = document.createElement('div');
  div.className = 'milestone';
  div.id = `ms-${i}`;
  div.innerHTML = `
    <div class="ms-dot">
      <svg viewBox="0 0 11 11" fill="none">
        <path d="M2 5.5l2.5 2.5 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="display:none" id="ms-check-${i}"/>
        <circle cx="5.5" cy="5.5" r="2" fill="currentColor" id="ms-circle-${i}"/>
      </svg>
    </div>
    <div class="ms-body">
      <div class="ms-title">${m.title}</div>
      <div class="ms-detail" id="ms-detail-${i}">${m.detail}</div>
    </div>
    <div class="ms-time" id="ms-time-${i}"></div>
  `;
  msContainer.appendChild(div);
});

// ── UI helpers ───────────────────────────────────────────────────────────────
const progressFill   = document.getElementById('progressFill');
const progressStatus = document.getElementById('progressStatus');
const progressPct    = document.getElementById('progressPct');
const factText       = document.getElementById('factText');

const shuffledFacts = [...FACTS].sort(() => Math.random() - .5);
factText.innerHTML = shuffledFacts[0];
let factIdx = 0;
setInterval(() => {
  factIdx = (factIdx + 1) % shuffledFacts.length;
  const fc = document.getElementById('factCard');
  fc.style.opacity = '0';
  setTimeout(() => { factText.innerHTML = shuffledFacts[factIdx]; fc.style.opacity = '1'; }, 400);
}, 6000);

function setProgress(pct, status) {
  progressFill.style.width  = pct + '%';
  progressPct.textContent   = pct + '%';
  progressStatus.textContent = status;
}

function activateMilestone(i) {
  document.getElementById(`ms-${i}`).classList.add('active');
  document.getElementById(`ms-circle-${i}`).style.display = 'none';
}

function completeMilestone(i, elapsed) {
  const el = document.getElementById(`ms-${i}`);
  el.classList.remove('active');
  el.classList.add('done');
  document.getElementById(`ms-circle-${i}`).style.display = 'none';
  document.getElementById(`ms-check-${i}`).style.display  = 'block';
  document.getElementById(`ms-time-${i}`).textContent = elapsed < 1000 ? `${elapsed}ms` : `${(elapsed/1000).toFixed(1)}s`;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── IndexedDB helpers ────────────────────────────────────────────────────────
function getFile() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('vitalscan', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('files');
    req.onsuccess = e => {
      const db  = e.target.result;
      const tx  = db.transaction('files', 'readwrite');
      const get = tx.objectStore('files').get('pending');
      get.onsuccess = () => resolve(get.result);
      get.onerror   = reject;
      // Clean up after read
      tx.objectStore('files').delete('pending');
    };
    req.onerror = reject;
  });
}

// ── Error display ─────────────────────────────────────────────────────────────
function showError(msg) {
  progressStatus.textContent = 'Analysis failed.';
  progressFill.style.background = '#f43f5e';
  document.querySelector('.headline').textContent = 'Something went wrong';
  document.querySelector('.sub').innerHTML =
    `<span style="color:#f43f5e">${msg}</span><br><br>
     <a href="upload.html" style="color:#3b9eff;text-decoration:none">← Try again</a>`;
}

// ── MAIN ─────────────────────────────────────────────────────────────────────
async function run() {
  // 1. Get file from IndexedDB
  let file;
  try {
    file = await getFile();
  } catch (_) {}

  if (!file) {
    // No file found — likely a direct page load, redirect to upload
    window.location.href = 'upload.html';
    return;
  }

  // 2. Start API call immediately (runs in parallel with animations)
  let apiResult = null;
  let apiError  = null;

  const formData = new FormData();
  formData.append('file', file);

  fetch(API_URL, { method: 'POST', body: formData })
    .then(res => {
      if (!res.ok) return res.text().then(t => { throw new Error(t || `Server error ${res.status}`); });
      return res.json();
    })
    .then(data  => { apiResult = data; })
    .catch(err  => { apiError  = err; });

  // 3. Run milestone animations
  let prevPct = 0;
  for (let i = 0; i < MILESTONES.length; i++) {
    const m  = MILESTONES[i];
    const t0 = Date.now();
    activateMilestone(i);
    setProgress(prevPct, m.statusText);

    const steps   = 20;
    const stepMs  = m.durationMs / steps;
    const pctStep = (m.pctEnd - prevPct) / steps;

    for (let s = 1; s <= steps; s++) {
      await delay(stepMs);
      const p = Math.round(prevPct + pctStep * s);
      progressFill.style.width = p + '%';
      progressPct.textContent  = p + '%';
    }

    completeMilestone(i, Date.now() - t0);
    prevPct = m.pctEnd;
  }

  // 4. Animations done — wait for API if it's still running
  setProgress(100, 'Analysis complete. Building your report…');

  while (!apiResult && !apiError) {
    await delay(300);
    // Pulse the status text while waiting
    const dots = '.'.repeat(((Date.now() / 600) | 0) % 4);
    progressStatus.textContent = 'Analysis complete. Building your report' + dots;
  }

  if (apiError) {
    showError(apiError.message || 'The server returned an error. Make sure the backend is running.');
    return;
  }

  // 5. Store result and redirect
  try {
    sessionStorage.setItem('vitalscan_result', JSON.stringify(apiResult));
  } catch (_) {
    showError('Result was too large to store. Try a smaller export.');
    return;
  }

  progressStatus.textContent = 'Done! Loading your results…';
  await delay(700);
  window.location.href = 'results.html';
}

window.addEventListener('load', () => setTimeout(run, 400));
</script>
</body>
</html>
